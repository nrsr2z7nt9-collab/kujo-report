<!doctype html><html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>捕獲報告書</title><link rel="stylesheet" href="print.css"></head><body>
<nav><button id="print">印刷・PDF保存</button><button id="back">入力画面へ戻る</button><small>スマホでは印刷画面からPDF保存・共有もできます。</small></nav>
<main id="pages" hidden>
 <section class="page front"><h1>捕獲報告書</h1><table>
  <tr><th>捕獲日</th><td id="date"></td><th>捕獲者</th><td id="hunter"></td></tr>
  <tr><th>捕獲種類</th><td colspan="3" id="species"></td></tr>
  <tr><th>捕獲地区</th><td colspan="3" id="district"></td></tr>
  <tr><th>捕獲場所</th><td id="location"></td><th>わな番号</th><td id="trap"></td></tr>
  <tr><th>大きさ</th><td id="size"></td><th>重さ・性別</th><td><span id="weight"></span>　<span id="sex"></span></td></tr>
  <tr><th>胎児・泌乳</th><td id="female"></td><th>角数</th><td id="antlers"></td></tr>
  <tr><th>捕獲方法</th><td colspan="3" id="method"></td></tr>
  <tr><th>廃棄</th><td colspan="3" id="disposal"></td></tr>
 </table><div class="front-photos"><figure id="p1"></figure><figure id="p2"></figure></div></section>
 <section class="page back"><h1>捕獲報告書</h1><figure id="p3"></figure></section>
</main><div id="error" hidden>記録を読み込めませんでした。</div><script src="print.js"></script></body></html>
